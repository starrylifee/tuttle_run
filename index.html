<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="학교 안내 지도를 따라 거북이를 움직여 보물을 찾는 로컬 저장형 학습 게임"
    />
    <title>거북이 학교 보물찾기</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7f2;
        color: #173427;
      }

      .boot-fallback {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .boot-fallback[hidden] {
        display: none;
      }

      .boot-fallback__card {
        max-width: 520px;
        padding: 28px;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(27, 50, 39, 0.12);
      }

      .boot-fallback h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .boot-fallback p {
        margin: 0 0 10px;
        line-height: 1.6;
      }

      .boot-fallback a {
        color: #1f7a4c;
        font-weight: 700;
      }

      .boot-fallback code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #eef4ed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <section id="bootFallback" class="boot-fallback" hidden>
      <div class="boot-fallback__card">
        <h1>실행 방식을 확인해 주세요</h1>
        <p>이 루트 <code>index.html</code>은 Vite 개발용 진입점이라서 Live Server가 바로 실행하지 못합니다.</p>
        <p><code>yarn dev</code>로 실행하거나, 먼저 <code>yarn build</code> 후 <a href="./dist/index.html">dist/index.html</a>을 열어 주세요.</p>
      </div>
    </section>
    <script type="module">
      async function boot() {
        try {
          await import('/src/main.tsx');
          return;
        } catch {
          try {
            const response = await fetch('./dist/index.html', { cache: 'no-store' });

            if (response.ok) {
              window.location.replace('./dist/index.html');
              return;
            }
          } catch {
            // Ignore fallback fetch errors and show the message.
          }

          const fallback = document.getElementById('bootFallback');

          if (fallback) {
            fallback.hidden = false;
          }
        }
      }

      boot();
    </script>
  </body>
</html>
